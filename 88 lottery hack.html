<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>BD ARIF 2K UI</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            height: 100vh;
            margin: 0;
        }

        /* Logo Box */
        .logo-box {
            background-color: #ff0000;
            padding: 10px;
            width: 115px;
            margin-bottom: 30px;
            border-radius: 4px;
            text-align: center;
        }

        .star {
            font-size: 45px;
            line-height: 1;
            background: linear-gradient(to bottom, #7fb9f1, #ffffff, #a3d941);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text { font-weight: bold; font-size: 14px; }

        /* New Title Update */
        .server-title {
            font-size: 20px;
            letter-spacing: 1.5px;
            margin-bottom: 45px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Main Container */
        .main-container {
            width: 340px;
            text-align: left;
        }

        /* Period Row */
        .period-row {
            border-bottom: 2px solid #ffffff;
            display: flex;
            align-items: center;
            padding-bottom: 8px;
            font-size: 22px;
            margin-bottom: 25px;
        }

        input[type="number"] {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 22px;
            outline: none;
            width: 130px;
            margin-left: 15px;
        }

        /* Next Result Row */
        .result-row {
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        /* Color Dot */
        .color-dot {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            display: inline-block;
            background-color: transparent;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 50px;
        }

        .btn {
            background-color: #003366;
            color: white;
            border: none;
            padding: 12px 0;
            width: 280px;
            font-size: 22px;
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:active { transform: scale(0.95); background-color: #004a94; }

        /* Hide Number Arrows */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <div class="star">★</div>
        <div class="logo-text">82LOTTERY</div>
    </div>

    <div class="server-title">BD ARIF 2K</div>

    <div class="main-container">
        <div class="period-row">
            <span>PERIOD NO :-</span>
            <input type="number" id="periodInput" placeholder="117">
        </div>

        <div class="result-row">
            <span>NEXT RESULT :- <span id="signalValue"></span></span>
            <span id="dotColor" class="color-dot"></span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="getStrongSignal()">RESULT</button>

        <a href="http://dkwin8.com/#/register?invitationCode=88684103969" class="btn" target="_blank">REGISTER NOW</a>

        <a href="https://t.me/BDARIF100K" class="btn" target="_blank">TELEGRAM</a>
    </div>

    <script>
        function getStrongSignal() {
            let input = document.getElementById("periodInput").value;
            let signalValue = document.getElementById("signalValue");
            let dot = document.getElementById("dotColor");

            if (input.length >= 1) {
                // Number and Color Logic
                let randomNum = Math.floor(Math.random() * 10);
                let size = (randomNum >= 5) ? "Big" : "Small";
                
                let color = "";
                if (randomNum === 0) {
                    color = "#ffffff"; // White for 0
                } else if (randomNum === 5) {
                    color = "linear-gradient(to right, #4CAF50, #EE82EE)"; // Green+Violet
                } else if (randomNum % 2 === 0) {
                    color = "#ff0000"; // Red
                } else {
                    color = "#4CAF50"; // Green
                }

                // Update UI
                signalValue.innerHTML = randomNum + " ( " + size + " )";
                dot.style.background = color;
                dot.style.boxShadow = "0 0 10px " + (randomNum === 0 ? "white" : (randomNum % 2 === 0 ? "red" : "green"));
                
            } else {
                alert("Please Enter Period Number!");
            }
        }
    </script>

</body>
</html>
